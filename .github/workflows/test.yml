name: Tests

on:
  push:
    branches: [main, develop, "refactor/*"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,plotting]"
          pip install packaging

      - name: Run unit tests
        run: |
          python -m pytest src/MTfit/tests/unit/ \
            -k "not InversionTestCase and not plot" \
            -q --tb=short \
            --ignore=src/MTfit/tests/unit/plot/
        timeout-minutes: 10

      - name: Run integration tests (examples)
        run: |
          cd examples
          python -c "
          import sys; sys.path.insert(0, '.')
          from p_polarity import run; run(test=True)
          print('P polarity OK')
          "
          python -c "
          import sys; sys.path.insert(0, '.')
          from double_couple import run; run(test=True)
          print('Double-couple OK')
          "
        timeout-minutes: 5
